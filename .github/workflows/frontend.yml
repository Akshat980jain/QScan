name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Build
  # ─────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://qrvault-api.onrender.com' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────
  # Job 2: Deploy to Render (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # No checkout needed — just fire the deploy hook
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering frontend deployment on Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Render deploy hook triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
