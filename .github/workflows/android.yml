name: Android CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Android/**'
      - '.github/workflows/android.yml'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        working-directory: Android
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: Android
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: Android/app/build/reports/tests/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Debug APK Build
  # ─────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        working-directory: Android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: Android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 3: Release APK Build (main branch only)
  # ─────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        working-directory: Android
        run: chmod +x gradlew

      - name: Decode Keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: Android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/qrvault-release.keystore
        continue-on-error: true

      - name: Build Release APK
        working-directory: Android
        run: |
          if [ -f "app/qrvault-release.keystore" ]; then
            echo "🔑 Keystore found — building signed release APK"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=app/qrvault-release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEY_STORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} \
              --stacktrace
          else
            echo "⚠️  No keystore configured — building unsigned release APK"
            ./gradlew assembleRelease --stacktrace
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: Android/app/build/outputs/apk/release/
          retention-days: 30
